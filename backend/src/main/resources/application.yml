server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  datasource:
    url: jdbc:h2:mem:certchain;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

# ── Blockchain configuration ────────────────────────────
# All secrets MUST come from environment variables, never hardcoded.
blockchain:
  node-url: ${BLOCKCHAIN_NODE_URL:http://127.0.0.1:8545}
  contract-address: ${CONTRACT_ADDRESS:}
  private-key: ${WALLET_PRIVATE_KEY:}

# ── File storage ────────────────────────────────────────
storage:
  upload-dir: ./certificate-storage

logging:
  level:
    com.certchain: DEBUG
    org.web3j: INFO
