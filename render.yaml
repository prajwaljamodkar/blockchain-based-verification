##########################################################
#  Render Blueprint — CertChain
#  https://render.com/docs/blueprint-spec
##########################################################

services:
  - type: web
    name: certchain
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon

    # Render sets the PORT env var automatically
    envVars:
      # ── Blockchain Configuration ──
      - key: WALLET_PRIVATE_KEY
        sync: false  # Prompt user to set manually in Render dashboard
      - key: CONTRACT_ADDRESS
        value: ""    # Left empty — entrypoint.sh auto-deploys in demo mode
      - key: BLOCKCHAIN_NODE_URL
        value: ""    # Left empty — entrypoint.sh starts embedded Hardhat node

      # ── Database (optional — leave empty to use H2 in-memory) ──
      # Connect a Render PostgreSQL database to auto-set DATABASE_URL
      - key: DATABASE_URL
        fromDatabase:
          name: certchain-db
          property: connectionString

    # Health check for zero-downtime deploys
    healthCheckPath: /actuator/health

    # Persistent disk for certificate PDF storage
    disk:
      name: certificate-storage
      mountPath: /app/certificate-storage
      sizeGB: 1

# Optional: Render Managed PostgreSQL
databases:
  - name: certchain-db
    plan: free
    databaseName: certchain
    user: certchain
